[app]
launch_at_startup = yes
hotkey_run = Alt+Space
ignored_packages = <all>, -Internal, -Apps

[gui]
auto_width = 30
hide_on_focus_lost = yes
theme = S4EBKP

[theme/S4EBKP]
opacity_back = 100
satellite_show = never
satellite_pos = topleft
satellite_size = small
control_margin = 4
textbox_padding = 2
listitem_padding = 1
layout = list_selmark
color_background = #484848
color_foreground = #f2f2f2
color_title = #f2f2f2
color_textbox_back = #303030
color_faded = #a2a2a2
color_status = #a2a2a2
color_accent = #6EACDA
color_warn = #6EACDA
color_listitem_back = #383838
color_listitem_title = #f2f2f2
color_listitem_desc = #a2a2a2
color_listitem_tips = #a2a2a2
color_listitem_selected_back = #2f2f2f
color_listitem_selected_title = #6EACDA
color_listitem_selected_desc = #f2f2f2
color_listitem_selected_tips = #6EACDA
font_large_size = 18
font_large_style = bold
font_snormal_size = 10
font_snormal_style = cleartype
font_normal_size = 14
font_normal_style = bold
font_small_size = 8
font_small_style = cleartype
font_face = Tahoma, Arial, Segoe UI
compact_results = no
listitem_title_font = normal